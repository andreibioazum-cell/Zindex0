name: Build_Android_APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build
        run: |
          export ANDROID_NDK=$ANDROID_NDK_HOME
          export API=28
          
          # 1. Скачиваем Raylib (только исходники)
          git clone --depth 1 https://github.com/raysan5/raylib.git
          
          # 2. Создаем "Ультимативный" CMakeLists.txt
          # Мы компилируем Raylib прямо внутри нашего проекта
          cat << 'EOF' > CMakeLists.txt
          cmake_minimum_required(VERSION 3.10)
          project(CubicGame CXX)
          set(CMAKE_CXX_STANDARD 11)

          set(RAY_SRC ${CMAKE_CURRENT_SOURCE_DIR}/raylib/src)
          set(GLUE_DIR ${ANDROID_NDK}/sources/android/native_app_glue)

          add_definitions(-DPLATFORM_ANDROID -DGRAPHICS_API_OPENGL_ES2 -DSUPPORT_RESOURCES_RAW)

          # Собираем всё вместе: Raylib + Glue + Твой код
          add_library(native-lib SHARED 
              main.cpp 
              ${RAY_SRC}/rcore.c 
              ${RAY_SRC}/rshapes.c 
              ${RAY_SRC}/rtextures.c 
              ${RAY_SRC}/rtext.c 
              ${RAY_SRC}/rmodels.c 
              ${RAY_SRC}/utils.c
              ${RAY_SRC}/raudio.c
              ${GLUE_DIR}/android_native_app_glue.c)

          target_include_directories(native-lib PRIVATE ${RAY_SRC} ${RAY_SRC}/external ${GLUE_DIR})
          target_link_libraries(native-lib android log EGL GLESv2 m)
          EOF

          # 3. Создаем Манифест
          cat << 'EOF' > AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cubic.game">
          <application android:hasCode="false" android:label="CubicGame">
          <activity android:name="android.app.NativeActivity" android:screenOrientation="landscape" android:configChanges="orientation|keyboardHidden">
          <meta-data android:name="android.app.lib_name" android:value="native-lib" />
          <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
          </activity></application></manifest>
          EOF

          # 4. Сборка
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-$API \
            -DANDROID_NDK=$ANDROID_NDK
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Core
          path: build/libnative-lib.so
